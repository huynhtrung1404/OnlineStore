name: Pull Request Trigger
run-name: Run Pull Request ${{github.event.pull_request.title}}
on:
  pull_request:
    types:
      - opened
      - synchronize
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: Setup dotnet 7
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x
      - run: dotnet restore
        name: Restore project
        working-directory: Backend
      - run: dotnet build --configuration Release --no-restore
        name: Build Project
        working-directory: Backend

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: Backend/
          args: >
            -Dsonar.organization=${{secrets.ORG}}
            -Dsonar.projectKey=${{secrets.PROJ_KEY}}

      - run: dotnet publish --configuration Release OnlineStore.Api
        name: Publish project OnlineStore.Api
        working-directory: Backend
      - name: Upload WebApp1 Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OnlineStore
          path: /home/runner/work/OnlineStore/OnlineStore/Backend/OnlineStore.Api/bin/Release/net7.0/publish/
