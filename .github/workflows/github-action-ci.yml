name: online-store-ci
run-name: ${{github.actor}}
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: Setup dotnet 7
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 7.0.x
          entrypoint: backend
      - run: dotnet build
        working-directory: Backend
